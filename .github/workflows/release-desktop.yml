name: Release Desktop

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate-tag:
    name: Validate release tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          package-manager-cache: false

      - name: Install pnpm
        run: npm install --global pnpm@10.33.0

      - name: Verify tag matches desktop version
        run: pnpm --dir desktop verify:release-tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}

  build:
    name: Build ${{ matrix.platform.name }} ${{ matrix.platform.arch }}
    needs: validate-tag
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS
            runner: macos-latest
            target_flag: --mac
            arch: arm64
            arch_flag: --arm64
            artifact_name: desktop-macos-arm64-assets
          - name: macOS
            runner: macos-15-intel
            target_flag: --mac
            arch: x64
            arch_flag: --x64
            artifact_name: desktop-macos-x64-assets
          - name: Windows
            runner: windows-latest
            target_flag: --win
            arch: x64
            arch_flag: --x64
            artifact_name: desktop-windows-x64-assets
          - name: Windows
            runner: windows-11-arm
            target_flag: --win
            arch: arm64
            arch_flag: --arm64
            artifact_name: desktop-windows-arm64-assets
          - name: Linux
            runner: ubuntu-latest
            target_flag: --linux
            arch: x64
            arch_flag: --x64
            artifact_name: desktop-linux-x64-assets
          - name: Linux
            runner: ubuntu-24.04-arm
            target_flag: --linux
            arch: arm64
            arch_flag: --arm64
            artifact_name: desktop-linux-arm64-assets

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          package-manager-cache: false

      - name: Install pnpm
        run: npm install --global pnpm@10.33.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run desktop tests
        run: pnpm --dir desktop test

      - name: Build release packages
        run: pnpm --dir desktop dist:ci -- ${{ matrix.platform.target_flag }} ${{ matrix.platform.arch_flag }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Collect release assets
        run: node desktop/scripts/collect-release-assets.mjs desktop/release .artifacts/release-assets

      - name: Upload release assets
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: .artifacts/release-assets/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          package-manager-cache: false

      - name: Download built assets
        uses: actions/download-artifact@v5
        with:
          path: .artifacts/downloaded-assets

      - name: Flatten release assets
        run: node desktop/scripts/collect-release-assets.mjs .artifacts/downloaded-assets .artifacts/publish-assets

      - name: Generate release notes
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: node desktop/scripts/generate-release-notes.mjs "${RELEASE_TAG}" "${GITHUB_REPOSITORY}" .artifacts/publish-assets .artifacts/release-notes.md

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if [[ "${RELEASE_TAG}" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          else
            PRERELEASE_FLAG=""
          fi

          if gh release view "${RELEASE_TAG}" > /dev/null 2>&1; then
            mapfile -t EXISTING_ASSETS < <(gh release view "${RELEASE_TAG}" --json assets --jq '.assets[].name')

            for ASSET_NAME in "${EXISTING_ASSETS[@]}"; do
              gh release delete-asset "${RELEASE_TAG}" "${ASSET_NAME}" --yes
            done

            gh release upload "${RELEASE_TAG}" .artifacts/publish-assets/* --clobber
            gh release edit "${RELEASE_TAG}" \
              --title "App Manager ${RELEASE_TAG}" \
              --notes-file .artifacts/release-notes.md \
              ${PRERELEASE_FLAG}
          else
            gh release create "${RELEASE_TAG}" .artifacts/publish-assets/* \
              --title "App Manager ${RELEASE_TAG}" \
              --notes-file .artifacts/release-notes.md \
              ${PRERELEASE_FLAG}
          fi
