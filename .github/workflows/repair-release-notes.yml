name: Repair Release Notes

on:
  push:
    tags:
      - "repair-release-notes/v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag, for example v0.1.3
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: repair-release-notes-${{ inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  repair:
    name: Repair ${{ inputs.release_tag || github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          package-manager-cache: false

      - name: Resolve target release tag
        env:
          RAW_RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
        run: |
          RELEASE_TAG="${RAW_RELEASE_TAG#repair-release-notes/}"

          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Unsupported release tag: ${RELEASE_TAG}" >&2
            exit 1
          fi

          echo "RELEASE_TAG=${RELEASE_TAG}" >> "${GITHUB_ENV}"

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release view "${RELEASE_TAG}"

      - name: Download existing release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "${RELEASE_TAG}" --dir .artifacts/publish-assets --pattern "*"

      - name: Generate release notes
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node desktop/scripts/generate-release-notes.mjs "${RELEASE_TAG}" "${GITHUB_REPOSITORY}" .artifacts/publish-assets .artifacts/release-notes.md

      - name: Update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${RELEASE_TAG}" \
            --title "App Manager ${RELEASE_TAG}" \
            --notes-file .artifacts/release-notes.md
