name: Repair Release Notes

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag, for example v0.1.3
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: repair-release-notes-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  repair:
    name: Repair ${{ inputs.release_tag }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          package-manager-cache: false

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: gh release view "${RELEASE_TAG}"

      - name: Download existing release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: gh release download "${RELEASE_TAG}" --dir .artifacts/publish-assets --pattern "*"

      - name: Generate release notes
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: node desktop/scripts/generate-release-notes.mjs "${RELEASE_TAG}" "${GITHUB_REPOSITORY}" .artifacts/publish-assets .artifacts/release-notes.md

      - name: Update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          gh release edit "${RELEASE_TAG}" \
            --title "App Manager ${RELEASE_TAG}" \
            --notes-file .artifacts/release-notes.md
