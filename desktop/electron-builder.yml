appId: com.zhcchen.app-manager
productName: App Manager
asar: true
artifactName: App-Manager-${version}-${os}-${arch}.${ext}
publish:
  provider: github
  owner: ZhcChen
  repo: App-Manager

directories:
  output: release

files:
  - dist/**
  - dist-electron/**
  - package.json

extraResources:
  - from: resources/bin
    to: bin
    filter:
      - "**/*"
  - from: ../packages/brand/logo
    to: brand
    filter:
      - app-manager-dock.png
      - app-manager-dev-dock.png

mac:
  icon: ../packages/brand/logo/app-manager-dock.icns
  category: public.app-category.utilities
  identity: "-"
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  target:
    - target: dmg
    - target: zip
  binaries:
    - Contents/Resources/bin/process-sidecar

win:
  icon: ../packages/brand/logo/app-manager-dock.png
  target:
    - target: nsis
      arch:
        - x64
        - arm64

linux:
  icon: ../packages/brand/logo/app-manager-dock.png
  category: Utility
  executableName: app-manager
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
