appId: com.zhcchen.app-manager
productName: App Manager
asar: true
icon: ../packages/brand/logo/app-manager-mark
artifactName: ${productName}-${version}-${os}-${arch}.${ext}

directories:
  output: release

files:
  - dist/**
  - dist-electron/**
  - package.json

extraResources:
  - from: resources/bin
    to: bin
    filter:
      - "**/*"

mac:
  category: public.app-category.utilities
  identity: "-"
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  target:
    - target: dmg
    - target: zip
  binaries:
    - Contents/Resources/bin/process-sidecar

win:
  target:
    - target: nsis
      arch:
        - x64

linux:
  category: Utility
  executableName: app-manager
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
